apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
      - name: orders-api
        image: orders-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 60 # Check every minute
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        env:
        - name: MONGO_USER
          value: "abkhan"
        - name: MONGO_PASSWORD
          value: "Pud8vHaN8Kst1PCZ"
        - name: MONGO_HOST
          value: "cluster0.dbpelmw.mongodb.net"
        - name: ALLOWED_ORIGINS
          value: "http://10.0.0.206,http://10.0.0.164,http://10.0.0.164:8080,http://10.0.0.164:3000,http://10.0.0.164:80,http://10.0.0.206:8080,http://10.0.0.206:3000,http://10.0.0.206:80,http://localhost:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
spec:
  selector:
    app: orders-api
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8080
  type: NodePort
---
